services:
  serietime-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: serietime-server
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./apps/server/data:/app/apps/server/data
    env_file:
      - .env
    restart: unless-stopped
    mem_limit: 512m
    cpus: "1.0"
